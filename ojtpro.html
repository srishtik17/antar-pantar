<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini Online Exam System</title>
<link rel="stylesheet" href="ojtpro.css">

</head>

<body>
<div id="home" class="page">
  <div class="card">
    <h1>Plattinum Exam Demo</h1>
    <p>Simple one-file online examination system with timer, navigation & scoring.</p>
    <button class="primary" onclick="startExam()">Start Exam</button>
  </div>
</div>


<div id="exam" class="page hidden">
  <div class="card">

    <div class="top">
      <h2>Online Exam</h2>
      <h3 id="timer">05:00</h3>
    </div>

    <p><b>Question <span id="qno"></span></b></p>

    <div id="question"></div>
    <div id="options"></div>

    <button onclick="prevQ()">Previous</button>
    <button onclick="nextQ()">Next</button>
    <button onclick="flagQ()">Flag</button>
    <button class="primary" onclick="submitExam()">Submit</button>

    <hr>

    <h3>Question Palette</h3>
    <div class="palette" id="palette"></div>

  </div>
</div>

<div id="result" class="page hidden">
  <div class="card">
    <h1>Exam Results</h1>
    <h2 id="score"></h2>
    <p id="details"></p>
    <button class="primary" onclick="location.reload()">Restart</button>
  </div>
</div>

<script src="ojtpro.js">

</script>

</body>
</html>
