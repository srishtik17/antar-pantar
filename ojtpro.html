<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini Online Exam System</title>

<style>
body{
  font-family: 'Segoe UI', Arial, sans-serif;
  margin:0;
  background: linear-gradient(135deg,#eef2ff,#f8fafc);
  color:#1e293b;
}

.page{
  padding:30px;
  max-width:1100px;
  margin:auto;
}

.card{
  background:#fff;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  transition:0.3s;
}

.card:hover{
  transform: translateY(-2px);
}

.hidden{display:none}


button{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:500;
  transition:0.2s;
  margin:5px 5px 10px 0;
}

button:hover{
  transform:scale(1.03);
}

.primary{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:#fff;
  box-shadow:0 5px 15px rgba(37,99,235,0.3);
}


.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
  padding-bottom:10px;
  border-bottom:1px solid #e2e8f0;
}


#question{
  font-size:18px;
  margin:15px 0;
}

.option{
  padding:12px 15px;
  margin:10px 0;
  border:2px solid #e5e7eb;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
  background:#f9fafb;
}

.option:hover{
  border-color:#93c5fd;
  background:#eff6ff;
}

.option.selected{
  background:#dbeafe;
  border-color:#2563eb;
  font-weight:600;
}

.palette{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  margin-top:10px;
}

.palette button{
  width:45px;
  height:45px;
  border-radius:10px;
  background:#f1f5f9;
  border:1px solid #e2e8f0;
  font-weight:bold;
}

.palette button:hover{
  background:#e0f2fe;
}


.flagged{
  background:#f59e0b !important;
  color:white;
  border:none;
}

.answered{
  background:#22c55e !important;
  color:white;
  border:none;
}

#result .card{
  text-align:center;
}

#score{
  font-size:28px;
  color:#2563eb;
}
</style>
</head>

<body>


<div id="home" class="page">
  <div class="card">
    <h1>Plattinum Exam Demo</h1>
    <p>Simple one-file online examination system with timer, navigation & scoring.</p>
    <button class="primary" onclick="startExam()">Start Exam</button>
  </div>
</div>


<div id="exam" class="page hidden">
  <div class="card">

    <div class="top">
      <h2>Online Exam</h2>
      <h3 id="timer">05:00</h3>
    </div>

    <p><b>Question <span id="qno"></span></b></p>

    <div id="question"></div>
    <div id="options"></div>

    <button onclick="prevQ()">Previous</button>
    <button onclick="nextQ()">Next</button>
    <button onclick="flagQ()">Flag</button>
    <button class="primary" onclick="submitExam()">Submit</button>

    <hr>

    <h3>Question Palette</h3>
    <div class="palette" id="palette"></div>

  </div>
</div>

<div id="result" class="page hidden">
  <div class="card">
    <h1>Exam Results</h1>
    <h2 id="score"></h2>
    <p id="details"></p>
    <button class="primary" onclick="location.reload()">Restart</button>
  </div>
</div>

<script>
const questions=[
  {q:"Capital of India?",o:["Delhi","Mumbai","Chennai","Pune"],a:0},
  {q:"2 + 2 = ?",o:["3","4","5","6"],a:1},
  {q:"HTML stands for?",o:["Hyper Text Markup Language","High Text","Home Tool","None"],a:0},
  {q:"CSS is used for?",o:["Logic","Database","Styling","Compiler"],a:2},
  {q:"JavaScript runs in?",o:["Browser","Printer","Monitor","Scanner"],a:0}
];

let current=0;
let answers={};
let flags=new Set();
let time=300;
let timer;


function startExam(){
  home.classList.add("hidden");
  exam.classList.remove("hidden");
  render();
  startTimer();
}


function startTimer(){
  timer=setInterval(()=>{
    time--;
    let m=String(Math.floor(time/60)).padStart(2,"0");
    let s=String(time%60).padStart(2,"0");
    timerEl().textContent=`${m}:${s}`;

    if(time<=0) submitExam();
  },1000);
}

function timerEl(){
  return document.getElementById("timer");
}




function render(){
  qno.textContent=current+1+" / "+questions.length;

  question.innerHTML="<h3>"+questions[current].q+"</h3>";

  options.innerHTML=questions[current].o.map((x,i)=>
    `<div class="option ${answers[current]===i?'selected':''}"
    onclick="selectAns(${i})">${x}</div>`
  ).join("");

  renderPalette();
}


function selectAns(i){
  answers[current]=i;
  render();
}

function nextQ(){
  if(current<questions.length-1) current++;
  render();
}

function prevQ(){
  if(current>0) current--;
  render();
}

function flagQ(){
  if(flags.has(current)) flags.delete(current);
  else flags.add(current);
  render();
}

function gotoQ(i){
  current=i;
  render();
}


function renderPalette(){
  palette.innerHTML=questions.map((_,i)=>{
    let c="";
    if(answers[i]!=null) c="answered";
    if(flags.has(i)) c="flagged";

    return `<button class="${c}" onclick="gotoQ(${i})">${i+1}</button>`;
  }).join("");
}

function submitExam(){
  clearInterval(timer);

  let correct=0;

  questions.forEach((q,i)=>{
    if(answers[i]===q.a) correct++;
  });

  let wrong=Object.keys(answers).length-correct;
  let unanswered=questions.length-Object.keys(answers).length;

  exam.classList.add("hidden");
  result.classList.remove("hidden");

  let percent=Math.round(correct/questions.length*100);

  score.textContent=`Score: ${correct}/${questions.length} (${percent}%)`;
  details.textContent=`Correct: ${correct}, Wrong: ${wrong}, Unanswered: ${unanswered}, Flagged: ${flags.size}`;
}
</script>

</body>
</html>
